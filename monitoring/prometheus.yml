global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'alogrithm-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['alogrithm-gateway:8080']
  - job_name: 'alogrithm-user-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['alogrithm-user-service:8081']
  - job_name: 'alogrithm-post-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['alogrithm-post-service:8082']
  - job_name: 'alogrithm-file-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['alogrithm-file-service:8085']
  - job_name: 'alogrithm-mail-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['alogrithm-mail-service:8087']
  - job_name: 'alogrithm-notification-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['alogrithm-notification-service:8083']
  - job_name: 'alogrithm-search-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['alogrithm-search-service:8084']
  - job_name: 'alogrithm-log-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['alogrithm-log-service:8086']
  - job_name: 'alogrithm-ai-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['alogrithm-ai-service:8089']

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'algorithm-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['algorithm-gateway:8080']
  - job_name: 'algorithm-user-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['algorithm-user-service:8081']
  - job_name: 'algorithm-post-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['algorithm-post-service:8082']
  - job_name: 'algorithm-file-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['algorithm-file-service:8085']
  - job_name: 'algorithm-mail-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['algorithm-mail-service:8087']
  - job_name: 'algorithm-notification-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['algorithm-notification-service:8083']
  - job_name: 'algorithm-search-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['algorithm-search-service:8084']
  - job_name: 'algorithm-log-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['algorithm-log-service:8086']
  - job_name: 'algorithm-ai-service'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['algorithm-ai-service:8089']

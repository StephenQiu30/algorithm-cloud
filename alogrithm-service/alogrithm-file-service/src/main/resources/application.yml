server:
  port: 8085

spring:
  application:
    name: alogrithm-file-service
  profiles:
    active: default
  config:
    activate:
      on-profile: default
    import:
      - nacos:common-secret.properties?group=DEFAULT_GROUP&refresh=true
      - nacos:common-web.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-cache.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-oss.yml?group=DEFAULT_GROUP&refresh=true
  cloud:
    nacos:
      config:
        server-addr: localhost:8848
        namespace: alogrithm-cloud
        group: DEFAULT_GROUP
        file-extension: yml
        username: nacos
        password: nacos
      discovery:
        server-addr: localhost:8848
        namespace: alogrithm-cloud
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 文件存储配置
file:
  storage:
    # 存储类型：cos, minio, oss
    type: cos
    # 路径前缀
    path-prefix: stephen

# Alogrithm Cloud 微服务应用部署配置
# 包含：Gateway、User、Post、File、Mail、Notification、Search、Log、AI 服务
# 使用方式：docker-compose up -d

version: '3.8'

services:
  # API 网关
  alogrithm-gateway:
    build:
      context: .
      dockerfile: alogrithm-gateway/Dockerfile
    image: alogrithm-gateway:${ALOGRITHM_CLOUD_VERSION:-latest}
    container_name: alogrithm-gateway
    restart: always
    ports:
      - "${GATEWAY_PORT_EXTERNAL}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=${NACOS_HOST}:${NACOS_PORT}
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_HOST}:${NACOS_PORT}
      - SPRING_CLOUD_NACOS_USERNAME=${NACOS_USERNAME}
      - SPRING_CLOUD_NACOS_PASSWORD=${NACOS_PASSWORD}
      - SPRING_MAIN_LAZY_INITIALIZATION=true
      - JAVA_TOOL_OPTIONS=-Xss256k -XX:MaxMetaspaceSize=128m -XX:MaxRAMPercentage=60.0 -XX:+TieredCompilation -XX:TieredStopAtLevel=1 -XX:+UseSerialGC -Dnacos.logging.default.config.enabled=false
    deploy:
      resources:
        limits:
          memory: 448M
    networks:
      - alogrithm-network

  # 用户服务
  alogrithm-user-service:
    build:
      context: .
      dockerfile: alogrithm-service/alogrithm-user-service/Dockerfile
    image: alogrithm-user-service:${ALOGRITHM_CLOUD_VERSION:-latest}

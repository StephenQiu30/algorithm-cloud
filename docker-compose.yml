      - SPRING_CLOUD_NACOS_USERNAME=${NACOS_USERNAME}
      - SPRING_CLOUD_NACOS_PASSWORD=${NACOS_PASSWORD}
      - SPRING_MAIN_LAZY_INITIALIZATION=true
      - JAVA_TOOL_OPTIONS=-Xss256k -XX:MaxMetaspaceSize=128m -XX:MaxRAMPercentage=60.0 -XX:+TieredCompilation -XX:TieredStopAtLevel=1 -XX:+UseSerialGC -Dnacos.logging.default.config.enabled=false

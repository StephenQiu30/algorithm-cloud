# 邮件服务配置
server:
  port: 8087

spring:
  application:
    name: algorithm-mail-service
  profiles:
    active: default
  config:
    activate:
      on-profile: default
    import:
      - nacos:common-secret.properties?group=DEFAULT_GROUP&refresh=true
      - nacos:common-web.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-cache.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-rabbitmq.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-mail.yml?group=DEFAULT_GROUP&refresh=true
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: algorithm-cloud
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
      config:
        server-addr: localhost:8848
        namespace: algorithm-cloud
        group: DEFAULT_GROUP
        file-extension: yml
        username: nacos
        password: nacos


# AI 服务配置
server:
  port: 8089

spring:
  application:
    name: algorithm-ai-service
  profiles:
    active: default
  config:
    activate:
      on-profile: default
    import:
      - nacos:common-secret.properties?group=DEFAULT_GROUP&refresh=true
      - nacos:common-web.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-cache.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-mysql.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-rabbitmq.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-elasticsearch.yml?group=DEFAULT_GROUP&refresh=true
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: algorithm-cloud
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
      config:
        server-addr: localhost:8848
        namespace: algorithm-cloud
        group: DEFAULT_GROUP
        file-extension: yml
        username: nacos
        password: nacos
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    dashscope:
      api-key: ${dev.aliyun.dashscope.api-key}
      chat:
        model: ${dev.aliyun.dashscope.model-name}
      embedding:
        model: text-embedding-v2
    vectorstore:
      elasticsearch:
        index-name: document_chunks
        dimensions: 1536
        similarity: cosine
        initialize-schema: true

# MyBatis-Plus 业务配置
mybatis-plus:
  type-aliases-package: com.stephen.cloud.ai.model.entity

# 文档处理配置
document:
  processing:
    chunk-size: 400
    overlap-size: 80
    max-file-size: 10485760  # 10MB
    timeout: 600000  # 10分钟
    supported-formats:
      - pdf
      - doc
      - docx
      - md
      - txt
      - ppt
      - pptx
      - html

# RAG 配置
rag:
  retrieval:
    top-k: 5
    vector-top-k: 10
    keyword-top-k: 10
    rrf-k: 60
    similarity-threshold: 0.7
    index-name: document_chunks
    rewrite-enabled: true
    rerank-enabled: true
    rerank-top-n: 10
    must-term-boost: 0.2
    metadata-match-boost: 0.1
  generation:
    max-context-length: 4000
    temperature: 0.7

chat:
  memory:
    redis-ttl-minutes: 30
    max-messages: 16
    keep-system-messages: true

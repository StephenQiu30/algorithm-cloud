# AI 服务配置
server:
  port: 8089

spring:
  application:
    name: algorithm-ai-service
  profiles:
    active: default
  config:
    activate:
      on-profile: default
    import:
      - nacos:common-secret.properties?group=DEFAULT_GROUP&refresh=true
      - nacos:common-web.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-cache.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-mysql.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-elasticsearch.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-rabbitmq.yml?group=DEFAULT_GROUP&refresh=true
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: algorithm-cloud
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
      config:
        server-addr: localhost:8848
        namespace: algorithm-cloud
        group: DEFAULT_GROUP
        file-extension: yml
        username: nacos
        password: nacos
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    dashscope:
      api-key: ${dev.aliyun.dashscope.api-key}
      options:
        model: ${dev.aliyun.dashscope.model-name}
      embedding:
        enabled: true
        options:
          model: text-embedding-v2

app:
  knowledge:
    vector-index: algorithm-knowledge-vectors
    embedding-dimension: 1536
    chunk-size: 400
    chunk-overlap: 50
    default-top-k: 5
    # 优化：降低相似度阈值，提升召回率（从 0.5 降到 0.3）
    vector-similarity-threshold: 0.3
    # 优化：降低 BM25 阈值，允许更多候选（从 0.0 保持不变）
    bm25-score-threshold: 0.0
    cache-dir: ./data/algorithm-kb-cache
    local-library-dir: ./data/algorithm-kb-library
    hybrid-search-enabled: true
    # 优化：增加 BM25 召回数量（从 30 提升到 50）
    hybrid-bm25-fetch-size: 50
    rrf-rank-constant: 60
    chunk-paragraph-merge-char-budget: 2500
    rag-top-k-max: 20
    retrieval-top-k-max: 50
    # 优化：降低最小匹配度，提升召回（从 50% 降到 30%）
    bm25-minimum-should-match: 30%
    vector-batch-size: 100
    # 优化：启用 KeywordMetadataEnricher（关键改进）
    keyword-metadata-enrich-enabled: true
    # 优化：增加关键词数量（从 5 提升到 8）
    keyword-metadata-count: 8
    keyword-metadata-mode: llm

# MyBatis-Plus 业务配置
mybatis-plus:
  type-aliases-package: com.stephen.cloud.ai.model.entity

# AI 服务配置
server:
  port: 8089

spring:
  application:
    name: algorithm-ai-service
  profiles:
    active: default
  config:
    activate:
      on-profile: default
    import:
      - nacos:common-secret.properties?group=DEFAULT_GROUP&refresh=true
      - nacos:common-web.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-cache.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-mysql.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-rabbitmq.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-elasticsearch.yml?group=DEFAULT_GROUP&refresh=true
      - nacos:common-ai.yml?group=DEFAULT_GROUP&refresh=true
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: algorithm-cloud
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
      config:
        server-addr: localhost:8848
        namespace: algorithm-cloud
        group: DEFAULT_GROUP
        file-extension: yml
        username: nacos
        password: nacos
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    dashscope:
      api-key: ${dev.aliyun.dashscope.api-key}
      chat:
        model: ${dev.aliyun.dashscope.model-name}
      embedding:
        model: text-embedding-v2
    vectorstore:
      elasticsearch:
        index-name: document_chunks_vector
        dimensions: 1024
        similarity: cosine
        initialize-schema: true

# MyBatis-Plus 业务配置
mybatis-plus:
  type-aliases-package: com.stephen.cloud.ai.model.entity

rag:
  retrieval:
    vector-index-name: document_chunks_vector
    keyword-index-name: document_chunks_search


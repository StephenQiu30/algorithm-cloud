# 公共 AI/RAG 配置文件
# 覆盖：ETL 文档处理 → 向量/关键词检索 → RRF 融合 → Rerank → 生成

# ETL 文档处理
document:
  processing:
    chunk-strategy: smart
    chunk-size: 400
    overlap-size: 80
    max-chunk-size: 800
    max-file-size: 10485760

# RAG 检索 & 生成
rag:
  retrieval:
    top-k: 5
    vector-top-k: 10
    keyword-top-k: 10
    rrf-k: 60
    similarity-threshold: 0.7
    vector-weight: 1.0
    keyword-weight: 1.0
    rewrite-enabled: true
    llm-rewrite-enabled: true
    rerank-enabled: true
    rerank-top-n: 10
    must-term-boost: 0.2
    metadata-match-boost: 0.1
    complex-query-top-k: 12
    retrieval-timeout-seconds: 3
  generation:
    max-context-length: 8000
    temperature: 0.4

# Chat Memory
chat:
  memory:
    redis-ttl-minutes: 30
    max-messages: 16
    keep-system-messages: true

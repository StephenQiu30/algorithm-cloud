# 公共 AI/RAG 配置文件 (Production)
# 生产环境覆盖配置：与 common-ai.yml 结构保持一致，仅覆盖差异值

spring:
  config:
    activate:
      on-profile: prod

# ETL 文档处理（生产环境：更大分片 + 更大文件限制）
document:
  processing:
    chunk-strategy: smart
    chunk-size: 500
    overlap-size: 100
    max-chunk-size: 1000
    max-file-size: 20971520

# RAG 检索 & 生成（生产环境：更多召回 + 稍低阈值 + 更大上下文）
rag:
  retrieval:
    top-k: 5
    vector-top-k: 15
    keyword-top-k: 15
    rrf-k: 60
    similarity-threshold: 0.65
    vector-weight: 1.0
    keyword-weight: 0.8
    rewrite-enabled: true
    llm-rewrite-enabled: true
    rerank-enabled: true
    rerank-top-n: 15
    must-term-boost: 0.2
    metadata-match-boost: 0.1
    complex-query-top-k: 15
    retrieval-timeout-seconds: 5
  generation:
    max-context-length: 8000
    temperature: 0.4

# Chat Memory（生产环境：更长 TTL + 更多消息）
chat:
  memory:
    redis-ttl-minutes: 60
    max-messages: 20
    keep-system-messages: true

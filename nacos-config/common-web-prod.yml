# 公共Web/业务配置文件 (Production)

server:
  servlet:
    context-path: /api

spring:
  config:
    activate:
      on-profile: prod
  # MVC 配置
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # Session 配置
  session:
    store-type: redis
    timeout: 2592000
  # 缓存配置
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterAccess=600s
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
      circuitbreaker:
        enabled: true

# 统一日志配置（prod 下 logback-spring.xml 会向 Logstash 输出，需与 docker-compose-env 中 logstash 服务同网）
logging:
  config: classpath:logback-spring.xml

# Logstash（ELK）：生产启用，各服务日志经 Logstash 写入 ES，可在 Kibana 查看
logstash:
  host: logstash
  port: 5000

# WebSocket（notification-service 使用，从 common-secret-prod 的 prod.websocket.* 注入）
websocket:
  port: ${prod.websocket.port:9090}
  boss-thread: ${prod.websocket.boss-thread:4}
  worker-thread: ${prod.websocket.worker-thread:16}

# Sa-Token 配置 (Prod)
sa-token:
  enable-sa: true
  enable-jwt: true
  token-name: Authorization
  timeout: 2592000
  active-timeout: 604800
  token-prefix: Bearer
  is-concurrent: true
  is-share: true
  token-style: jwt
  is-log: false
  jwt-secret-key: ${prod.sa-token.jwt-secret-key}
  alone-redis:
    database: ${prod.redis.database}
    host: ${prod.redis.host}
    port: ${prod.redis.port}
    password: ${prod.redis.password}
    timeout: 5000

# 请求参数加密校验配置
encrypt:
  enable: true
  rsa-key-length: length4096
  aes-key-length: length32

# 登录验证码配置（user-service 使用）
login:
  email:
    code:
      expire-time: 300
      length: 6
      send-limit: 60
      ip-limit: 10

# Feign 熔断 Resilience4j
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 100
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 10
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s

# 监控配置: Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: 'health,info,prometheus'
  endpoint:
    health:
      show-details: always
  health:
    elasticsearch:
      enabled: false
    redis:
      enabled: true
    rabbit:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
